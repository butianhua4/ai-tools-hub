name: Content Check
on: [pull_request, push]

permissions:
  contents: read

concurrency:
  group: content-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run content:check -- --summary
      - run: npm run build
