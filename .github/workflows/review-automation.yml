name: Project Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
    - cron: "30 23 * * *"

permissions:
  contents: write

concurrency:
  group: project-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  project-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run project automation
        run: npm run automation:all

      - name: Commit refreshed automation reports
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/automation docs/automation-digest.md docs/automation-gate.md docs/publish-readiness-pack.md docs/review-automation.md docs/review-preflight.md docs/seo-opportunity-map.md
          if git diff --cached --quiet; then
            echo "No automation report changes to commit."
          else
            git commit -m "Refresh automation reports"
            git push
          fi

      - name: Check live search surfaces
        run: npm run live:check -- --url=https://ai-jiedan-lab.vercel.app

      - name: Add automation digest to job summary
        if: always()
        shell: bash
        run: |
          if [ -f docs/automation-digest.md ]; then
            cat docs/automation-digest.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Automation Digest"
              echo ""
              echo "Digest report was not generated. Download the project-automation artifact and inspect automation-run-summary.json."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload project automation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-automation
          path: |
            content/automation/review-candidates.json
            content/automation/publish-readiness-pack.json
            content/automation/review-preflight.json
            content/automation/draft-guardrail-sanitize.json
            content/automation/automation-gate.json
            content/automation/automation-digest.json
            content/automation/project-status.json
            content/automation/seo-check.json
            content/automation/seo-opportunity-map.json
            content/automation/searchability-check.json
            content/automation/automation-run-summary.json
            docs/review-automation.md
            docs/automation-gate.md
            docs/automation-digest.md
            docs/publish-readiness-pack.md
            docs/project-automation.md
            docs/review-preflight.md
            docs/seo-opportunity-map.md
