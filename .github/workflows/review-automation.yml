name: Project Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"

jobs:
  project-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Check draft guardrail cleanup
        run: npm run automation:sanitize-drafts -- --dry-run

      - name: Generate review queue
        run: npm run automation:review -- --limit=25

      - name: Generate project status
        run: npm run --silent project:status > content/automation/project-status.json

      - name: Run SEO safety check
        run: npm run --silent seo:check > content/automation/seo-check.json

      - name: Run searchability check
        run: npm run --silent searchability:check > content/automation/searchability-check.json

      - name: Upload project automation reports
        uses: actions/upload-artifact@v4
        with:
          name: project-automation
          path: |
            content/automation/review-candidates.json
            content/automation/draft-guardrail-sanitize.json
            content/automation/project-status.json
            content/automation/seo-check.json
            content/automation/searchability-check.json
            docs/review-automation.md
