name: Project Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
    - cron: "30 23 * * *"

permissions:
  contents: write

concurrency:
  group: project-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  project-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run project automation
        run: npm run automation:all

      - name: Check live search surfaces
        shell: bash
        run: |
          set +e
          npm run live:check -- --url=https://ai-jiedan-lab.vercel.app --json=content/automation/live-search-surface.json --markdown=docs/live-search-surface.md
          code=$?
          echo "LIVE_SEARCH_SURFACE_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Refresh automation gate and digest after live check
        shell: bash
        run: |
          npm run traffic:evidence -- --url=https://ai-jiedan-lab.vercel.app
          npm run traffic:claim-guard
          npm run automation:gate
          npm run automation:digest

      - name: Commit refreshed automation reports
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/automation docs/ai-deployment-coverage.md docs/automation-digest.md docs/automation-gate.md docs/content-cannibalization.md docs/content-freshness.md docs/content-integrity-audit.md docs/content-opportunity-backlog.md docs/industry-prompt-coverage.md docs/internal-link-opportunity-audit.md docs/live-search-surface.md docs/manual-review-workbench.md docs/next-review-source-pack.md docs/public-expansion-queue.md docs/publish-readiness-pack.md docs/review-automation.md docs/review-batch-plan.md docs/review-coverage-report.md docs/review-preflight.md docs/review-priority-roadmap.md docs/search-intent-approval-packet.md docs/search-intent-lane-map.md docs/search-intent-wave-planner.md docs/search-query-coverage.md docs/search-query-match-audit.md docs/search-snippet-readiness-audit.md docs/seo-opportunity-map.md docs/structured-data-readiness-audit.md docs/traffic-claim-guard.md docs/traffic-evidence-audit.md docs/wave-approval-packet.md docs/wave-publish-simulation.md
          if git diff --cached --quiet; then
            echo "No automation report changes to commit."
          else
            git commit -m "Refresh automation reports"
            git push
          fi

      - name: Add automation digest to job summary
        if: always()
        shell: bash
        run: |
          if [ -f docs/automation-digest.md ]; then
            cat docs/automation-digest.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Automation Digest"
              echo ""
              echo "Digest report was not generated. Download the project-automation artifact and inspect automation-run-summary.json."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload project automation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-automation
          path: |
            content/automation/review-candidates.json
            content/automation/review-batch-plan.json
            content/automation/review-coverage-report.json
            content/automation/review-priority-roadmap.json
            content/automation/next-review-source-pack.json
            content/automation/public-expansion-queue.json
            content/automation/wave-approval-packet.json
            content/automation/wave-publish-simulation.json
            content/automation/traffic-evidence-audit.json
            content/automation/traffic-claim-guard.json
            content/automation/publish-readiness-pack.json
            content/automation/review-preflight.json
            content/automation/draft-guardrail-sanitize.json
            content/automation/automation-gate.json
            content/automation/automation-digest.json
            content/automation/ai-deployment-coverage.json
            content/automation/content-cannibalization.json
            content/automation/content-freshness.json
            content/automation/content-integrity-audit.json
            content/automation/industry-prompt-coverage.json
            content/automation/internal-link-opportunity-audit.json
            content/automation/content-opportunity-backlog.json
            content/automation/live-search-surface.json
            content/automation/manual-review-workbench.json
            content/automation/project-status.json
            content/automation/seo-check.json
            content/automation/seo-opportunity-map.json
            content/automation/search-snippet-readiness-audit.json
            content/automation/search-intent-approval-packet.json
            content/automation/search-intent-lane-map.json
            content/automation/search-intent-wave-planner.json
            content/automation/search-query-coverage.json
            content/automation/search-query-match-audit.json
            content/automation/structured-data-readiness-audit.json
            content/automation/searchability-check.json
            content/automation/automation-run-summary.json
            docs/ai-deployment-coverage.md
            docs/review-automation.md
            docs/review-batch-plan.md
            docs/review-coverage-report.md
            docs/review-priority-roadmap.md
            docs/next-review-source-pack.md
            docs/public-expansion-queue.md
            docs/wave-approval-packet.md
            docs/wave-publish-simulation.md
            docs/traffic-evidence-audit.md
            docs/traffic-claim-guard.md
            docs/automation-gate.md
            docs/automation-digest.md
            docs/content-cannibalization.md
            docs/content-freshness.md
            docs/content-integrity-audit.md
            docs/content-opportunity-backlog.md
            docs/industry-prompt-coverage.md
            docs/internal-link-opportunity-audit.md
            docs/live-search-surface.md
            docs/manual-review-workbench.md
            docs/publish-readiness-pack.md
            docs/project-automation.md
            docs/review-preflight.md
            docs/search-intent-approval-packet.md
            docs/search-intent-lane-map.md
            docs/search-intent-wave-planner.md
            docs/search-query-coverage.md
            docs/search-query-match-audit.md
            docs/search-snippet-readiness-audit.md
            docs/seo-opportunity-map.md
            docs/structured-data-readiness-audit.md

      - name: Fail if live search surfaces failed
        if: always()
        shell: bash
        run: |
          if [ "${LIVE_SEARCH_SURFACE_EXIT_CODE:-0}" != "0" ]; then
            echo "Live search surface check failed. See docs/live-search-surface.md or the project-automation artifact."
            exit 1
          fi
