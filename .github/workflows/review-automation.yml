name: Project Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
    - cron: "30 23 * * *"

permissions:
  contents: write

concurrency:
  group: project-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  project-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Run project automation
        shell: bash
        run: |
          set +e
          npm run automation:all
          code=$?
          echo "PROJECT_AUTOMATION_EXIT_CODE=$code" >> "$GITHUB_ENV"
          if [ "$code" != "0" ]; then
            echo "::warning::Project automation generated advisory failures. Reports were still produced; hard failure is reserved for live SEO surface checks."
          fi
          exit 0

      - name: Check live search surfaces
        shell: bash
        run: |
          set +e
          npm run live:check -- --url=https://ai-jiedan-lab.vercel.app --json=content/automation/live-search-surface.json --markdown=docs/live-search-surface.md --article-concurrency=4 --fetch-retries=6 --fetch-timeout-ms=30000
          code=$?
          echo "LIVE_SEARCH_SURFACE_EXIT_CODE=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Refresh automation gate and digest after live check
        shell: bash
        run: |
          set +e
          refresh_code=0
          npm run traffic:evidence -- --url=https://ai-jiedan-lab.vercel.app
          refresh_code=$(( refresh_code || $? ))
          npm run deploy:freshness -- --url=https://ai-jiedan-lab.vercel.app --fetch-retries=4 --fetch-timeout-ms=15000
          refresh_code=$(( refresh_code || $? ))
          npm run traffic:claim-guard
          refresh_code=$(( refresh_code || $? ))
          npm run search-console:indexing-priority
          refresh_code=$(( refresh_code || $? ))
          npm run seo:growth-daily-ops
          refresh_code=$(( refresh_code || $? ))
          npm run indexnow:readiness
          refresh_code=$(( refresh_code || $? ))
          npm run searchability:check
          refresh_code=$(( refresh_code || $? ))
          npm run seo:check
          refresh_code=$(( refresh_code || $? ))
          npm run automation:public-surface-inventory
          refresh_code=$(( refresh_code || $? ))
          npm run automation:broad-first-coverage-launch
          refresh_code=$(( refresh_code || $? ))
          npm run automation:broad-first-coverage-readiness
          refresh_code=$(( refresh_code || $? ))
          npm run automation:gate
          refresh_code=$(( refresh_code || $? ))
          npm run automation:digest
          refresh_code=$(( refresh_code || $? ))
          echo "REFRESH_REPORTS_EXIT_CODE=$refresh_code" >> "$GITHUB_ENV"
          if [ "$refresh_code" != "0" ]; then
            echo "::warning::Automation report refresh generated advisory failures. Reports were still uploaded; hard failure is reserved for live SEO surface checks."
          fi
          exit 0

      - name: Commit refreshed automation reports
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/automation docs/*.md
          if git diff --cached --quiet; then
            echo "No automation report changes to commit."
          else
            git commit -m "Refresh automation reports"
            git push
          fi

      - name: Add automation digest to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Project Automation Run"
            echo ""
            echo "- Project automation exit code: ${PROJECT_AUTOMATION_EXIT_CODE:-0}"
            echo "- Live search surface exit code: ${LIVE_SEARCH_SURFACE_EXIT_CODE:-not-run}"
            echo "- Report refresh exit code: ${REFRESH_REPORTS_EXIT_CODE:-not-run}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/automation-digest.md ]; then
            cat docs/automation-digest.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Automation Digest"
              echo ""
              echo "Digest report was not generated. Download the project-automation artifact and inspect automation-run-summary.json."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload project automation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-automation
          path: |
            content/automation/*.json
            docs/*.md

      - name: Fail if live search surfaces failed
        if: always()
        shell: bash
        run: |
          if [ "${LIVE_SEARCH_SURFACE_EXIT_CODE:-0}" != "0" ]; then
            echo "Live search surface check failed. See docs/live-search-surface.md or the project-automation artifact."
            exit 1
          fi
