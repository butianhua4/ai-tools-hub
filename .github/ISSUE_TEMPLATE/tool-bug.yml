name: Tool bug or improvement
description: Report or plan changes for AI tools, prompt workflows, deployment planners, templates, or the tool directory.
title: "[Tool] "
labels:
  - tool
body:
  - type: dropdown
    id: tool
    attributes:
      label: Tool area
      options:
        - Office AI workflows
        - Prompt library or prompt builder
        - Deployment planners
        - RAG or memory planner
        - API routing cost checker
        - Proposal generator
        - Error explainer
        - Pricing calculator
        - Tool directory
        - Templates
        - Blog/content system
        - SEO metadata
        - Other
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happens now?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add examples, URLs, screenshots, or reproduction steps when useful.
