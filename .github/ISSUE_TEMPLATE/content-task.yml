name: Content task
description: Plan one tutorial, tool guide, comparison, prompt page, checklist, or template page.
title: "[Content] "
labels:
  - content
body:
  - type: input
    id: keyword
    attributes:
      label: Primary keyword
      description: The specific search query this page should answer.
      placeholder: "AI 做 PPT 怎么写提示词"
    validations:
      required: true
  - type: dropdown
    id: content_type
    attributes:
      label: Content type
      options:
        - tutorial
        - checklist
        - comparison
        - template
        - troubleshooting
        - tool-guide
        - pricing-guide
        - prompt-library
        - deployment-guide
        - office-ai-workflow
        - ai-tool-comparison
        - roadmap
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What concrete beginner problem should this page solve?
    validations:
      required: true
  - type: textarea
    id: outline
    attributes:
      label: Draft outline
      description: Include suitable readers, unsuitable readers, steps, risks, tool CTA, and internal links.
    validations:
      required: true
  - type: checkboxes
    id: quality
    attributes:
      label: Quality rules
      options:
        - label: This will be original content, not copied or spun.
          required: true
        - label: The page will include actionable steps for beginners.
          required: true
        - label: The page will include risk warnings and no ranking, income, or result guarantee.
          required: true
        - label: The page will stay draft/noindex until human review.
          required: true
